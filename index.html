<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Magic of Hogwarts - Eugene's Birthday</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght=700&family=Marcellus&family=Playfair+Display:ital,wght=1,600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        .movie-container {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .page.active {
            display: flex;
        }

        .dialogue-box {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 950px;
            min-height: 150px;
            background: rgba(245, 235, 215, 0.95);
            border: 3px solid #8B5A2B;
            border-radius: 15px;
            padding: 25px 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dialogue-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 24px;
            line-height: 1.5;
            color: #5C3A21;
            font-weight: bold;
            text-align: center;
            white-space: pre-wrap;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: #5C3A21;
            color: #f5ebd7;
            border: 2px solid #8B5A2B;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            border-radius: 8px;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        video.fullscreen-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .letter-popup {
            max-width: 85%;
            max-height: 90%;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            animation: cinematicZoom 0.8s ease-out;
            z-index: 5;
        }

        .embedded-video {
            display: none;
            position: relative;
            width: 75%;
            max-width: 800px;
            max-height: 65%;
            border: 5px solid #8B5A2B;
            border-radius: 12px;
            box-shadow: 0 0 45px rgba(0,0,0,0.9);
            z-index: 15;
            background-color: #000;
        }

        .cake-icon {
            width: 250px;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            z-index: 5;
            transition: transform 0.3s;
        }
        .cake-icon:hover { transform: scale(1.1); }

        .scrollable-wishes {
            max-height: 130px;
            overflow-y: auto;
            padding-right: 15px;
            text-align: left;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 22px;
            line-height: 1.6;
            color: #5C3A21;
        }
        .scrollable-wishes::-webkit-scrollbar { width: 6px; }
        .scrollable-wishes::-webkit-scrollbar-thumb { background: #8B5A2B; border-radius: 3px; }

        .diagon-item {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s, filter 0.3s;
            filter: drop-shadow(0px 0px 12px rgba(255, 255, 255, 0.75)) drop-shadow(0px 0px 4px rgba(255, 255, 255, 0.5));
            z-index: 5;
        }
        .diagon-item:hover { transform: scale(1.15); }
        .diagon-item.collected { filter: grayscale(1) opacity(0.1) drop-shadow(0 0 0 transparent); transform: scale(0.85); }
        
        #itemNimbus  { width: 280px; left: 4%;   top: 35%; }                      
        #itemWand    { width: 220px; right: 5%;  top: 35%; }                      
        #itemRacoon  { width: 170px; left: 50%;  top: 10%;  transform: translateX(-50%); } 
        #itemBooks   { width: 160px; left: 50%;  top: 55%;  transform: translateX(-50%); } 

        .sorting-hat-big {
            position: absolute;
            top: 0%; 
            width: 800px; 
            max-width: 95%;
            animation: bounce 2.5s infinite;
            z-index: 4;
        }
        
        .child-popup {
            position: absolute;
            width: 480px;
            height: 580px;
            max-width: 90%;
            max-height: 65%;
            object-fit: cover;
            border: 6px solid #f5ebd7;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            animation: cinematicZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 5;
        }

        .ending-photos-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
            height: 100%;
            z-index: 5;
            padding-bottom: 40px;
        }

        .couple-img {
            max-width: 80%;
            max-height: 42%;
            object-fit: contain;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0px 0px 25px rgba(255,255,255,0.35));
        }

        .transparent-me-img {
            max-width: 85%;            
            max-height: 45%;           
            object-fit: contain;
            border: 4px solid #f5ebd7;  
            border-radius: 8px;        
            padding: 4px;              
            background: rgba(0, 0, 0, 0.4); 
            animation: float 4s ease-in-out infinite;
            animation-delay: 0.5s; 
            filter: drop-shadow(0px 0px 30px rgba(255,255,255,0.65)) drop-shadow(0px 0px 10px rgba(255,255,255,0.4)); 
        }

        @keyframes cinematicZoom { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .click-hint { position: absolute; right: 25px; bottom: 8px; font-size: 11px; color: #8B5A2B; opacity: 0.5; font-family: sans-serif; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- FIXED: extension changed to .mp3 -->
    <audio id="mysteryMusic" src="mysterymusic.mp3" loop></audio>

    <div class="movie-container" id="movieContainer" onclick="handleGlobalClick()">

        <!-- PAGE 1: Intro Video Base (FIXED: extensions changed to .jpg and .mp4) -->
        <div class="page active" id="page1" style="background-image: url('star.jpg');">
            <button class="start-btn" id="startBtn" onclick="startMovie(event)">ENTER THE INTERACTIVE MOVIE</button>
            <video id="introVideo" class="fullscreen-bg" style="display:none;" playsinline>
                <source src="intro.mp4" type="video/mp4">
            </video>
        </div>

        <!-- PAGE 2: Hagrid Appears & Music Starts (FIXED: extension changed to .jpg) -->
        <div class="page" id="page2" style="background-image: url('Hagrid.jpg');">
            <div class="dialogue-box">
                <div class="dialogue-text" id="textPage2"></div>
                <div class="click-hint" id="hintPage2" style="display:none;">Click anywhere to continue</div>
            </div>
        </div>

        <!-- PAGE 3: Letter Popup (FIXED: extension changed to .png) -->
        <div class="page" id="page3" style="background-color: #0c0c0e;">
            <img src="letter.png" class="letter-popup" alt="Hogwarts Letter">
            <div class="click-hint" style="color: #fff; bottom: 20px; opacity: 0.7;">Click anywhere to continue</div>
        </div>

        <!-- PAGE 4: Hagrid Speech & Giving Cake Video (FIXED: extensions changed to .jpg and .mp4) -->
        <div class="page" id="page4" style="background-image: url('Hagrid.jpg');">
            <video id="givingCakeVideo" class="embedded-video" playsinline>
                <source src="givingcake.mp4" type="video/mp4">
            </video>
            <div class="dialogue-box" id="boxPage4">
                <div class="dialogue-text" id="textPage4"></div>
                <div class="click-hint" id="hintPage4" style="display:none;">Click anywhere to watch video</div>
            </div>
        </div>

        <!-- PAGE 5: Open Cake Background & Scrollable Wishes (FIXED: extensions changed to .jpg and .png) -->
        <div class="page" id="page5" style="background-image: url('opencake.jpg');">
            <img src="cake.png" id="cakeIcon" class="cake-icon" alt="Cake Icon" onclick="revealMagicWishes(event)">
            
            <div class="dialogue-box" id="cakeDialogueBox">
                <div class="dialogue-text" id="cakeDefaultText"></div>
            </div>
        </div>

        <!-- PAGE 6: Hagrid Train Warning (FIXED: extension changed to .jpg) -->
        <div class="page" id="page6" style="background-image: url('Hagrid.jpg');">
            <div class="dialogue-box">
                <div class="dialogue-text" id="textPage6"></div>
                <div class="click-hint" id="hintPage6" style="display:none;">Click anywhere to continue</div>
            </div>
        </div>

        <!-- PAGE 7: Diagon Alley Item Gathering (FIXED: extensions changed to .jpg and .png) -->
        <div class="page" id="page7" style="background-image: url('Diagonalley.jpg');">
            <img src="nimbus.png" id="itemNimbus" class="diagon-item" alt="Nimbus" onclick="selectDiagonItem('nimbus', event)">
            <img src="wand.png" id="itemWand" class="diagon-item" alt="Wand" onclick="selectDiagonItem('wand', event)">
            <img src="racoon.png" id="itemRacoon" class="diagon-item" alt="Racoon" onclick="selectDiagonItem('racoon', event)">
            <img src="books.png" id="itemBooks" class="diagon-item" alt="Spellbooks" onclick="selectDiagonItem('books', event)">

            <div class="dialogue-box" style="cursor: default;" onclick="event.stopPropagation()">
                <div class="dialogue-text" id="textPage7"></div>
                <div class="click-hint" id="hintPage7" style="display:none;">Click anywhere to board the train</div>
            </div>
        </div>

        <!-- PAGE 8: Hogwarts Express Showcase (FIXED: extension changed to .jpg) -->
        <div class="page" id="page8" style="background-image: url('hogwartexpress.jpg');">
            <div class="click-hint" style="color: #fff; bottom: 30px; opacity: 0.85; font-size: 16px; font-family:'Cinzel', serif; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px;">
                All aboard! Click anywhere to depart for Hogwarts School... 🚂
            </div>
        </div>

        <!-- PAGE 9: Hogwarts Entrance Video & Sorting Ceremony (FIXED: extensions changed to .mp4, .jpg, .png, .mp3) -->
        <div class="page" id="page9" style="background-color: #000;">
            <video id="entranceVideo" class="fullscreen-bg" style="display:none;" playsinline>
                <source src="Hogwartentrance.mp4" type="video/mp4">
            </video>

            <div id="sortingScene" style="display:none; width:100%; height:100%; position:absolute; background-image:url('Sortinghatchair.jpg'); background-size:cover; background-position:center; justify-content:center; align-items:center;">
                <img src="sortinghat.png" class="sorting-hat-big" id="sortingHatImg" alt="Sorting Hat">
                <img src="childwithhat.png" class="child-popup" id="childWithHatImg" style="display:none;" alt="Child with Sorting Hat">

                <div class="dialogue-box" id="sortingDialogueBox" style="z-index:20;">
                    <div class="dialogue-text" id="textPage9"></div>
                    <div class="click-hint" id="hintPage9" style="display:none;">Click anywhere to continue</div>
                </div>
            </div>
            <audio id="sortingHatSound" src="sortinghatsound.mp3"></audio>
        </div>

        <!-- PAGE 10: Dumbledore Final Speech (FIXED: extensions changed to .jpg and .mp3) -->
        <div class="page" id="page10" style="background-image: url('dumbledore.jpg');">
            <div class="dialogue-box" style="z-index: 10;">
                <div class="dialogue-text" id="textPage10"></div>
                <div class="click-hint" id="hintPage10" style="display:none;">Click anywhere to continue</div>
            </div>
            <audio id="endingspeechSound" src="endingspeech.mp3"></audio>
        </div>

        <!-- PAGE 11: Ending Photo Scene (FIXED: extensions changed to .jpg and .png) -->
        <div class="page" id="page11" style="background-image: url('star.jpg');">
            <div class="ending-photos-container">
                <img src="couple.png" class="couple-img" alt="We belong together">
                <img src="me.png" class="transparent-me-img" alt="Special Memory Photo">
            </div>
            <div class="click-hint" style="color: #fff; bottom: 20px; opacity: 0.6; font-size: 13px;">Happy Birthday, Eugene! ✨</div>
        </div>

    </div>

    <script>
        let currentPage = 1;
        const totalPages = 11; 
        
        const txtPage2 = "Hello, Eugene! I’m Rubeus Hagrid, Keeper of Keys and Grounds at Hogwarts. I brought you your letter!";
        const txtPage4 = "Got somethin' fer yeh... 'fraid I might've sat on it at some point, but I imagine it'll taste fine just the same. Baked it myself, words and all";
        const txtPage5Default = "( Tap on the cake to read your magic wishes )";
        const txtPage6 = "We should leave soon to get your stuff, Eugene. Gotta go before ya train leaves.";
        const txtPage7 = "Welcome to Diagon Alley. We gotta hurry, Eugene. Grab the stuff you need.\n(Click all 4 items to pack your trunk!)";
        
        let itemsFound = { nimbus: false, wand: false, racoon: false, books: false };
        let allItemsCollected = false; 
        let sortingStage = 0;
        let isSortingAudioPlaying = false;
        let dumbleStage = 0;
        let isDumbleAudioPlaying = false;

        function typeWriter(elementId, text, speed = 40, callback = null) {
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            let i = 0;
            
            if (element.typingInterval) clearInterval(element.typingInterval);
            
            element.typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(element.typingInterval);
                    if (callback) callback();
                }
            }, speed);
        }

        function startMovie(event) {
            event.stopPropagation();
            document.getElementById('startBtn').style.display = 'none';
            
            const bgMusic = document.getElementById('mysteryMusic');
            bgMusic.volume = 0.3;

            const introVid = document.getElementById('introVideo');
            introVid.style.display = 'block';
            introVid.play();

            introVid.onended = function() {
                nextPage();
            };
        }

        function handleGlobalClick() {
            if (currentPage === 1) return; 
            if (currentPage === 3) { nextPage(); return; }
            if (currentPage === 4) { handlePage4VideoTrigger(); return; }
            if (currentPage === 5) return; 
            
            if (currentPage === 7) {
                if (allItemsCollected) {
                    nextPage();
                }
                return; 
            }
            
            if (currentPage === 9) {
                handleSortingLogic();
                return;
            }
            if (currentPage === 10) {
                handleDumbledoreLogic();
                return;
            }
            if (currentPage === 11) return; 

            nextPage();
        }

        function nextPage() {
            if (currentPage < totalPages) {
                document.getElementById(`page${currentPage}`).classList.remove('active');
                currentPage++;
                
                const nextPageEl = document.getElementById(`page${currentPage}`);
                nextPageEl.classList.add('active');

                if (currentPage === 2) {
                    document.getElementById('mysteryMusic').play().catch(e => console.log("Audio waiting"));
                    typeWriter('textPage2', txtPage2, 40, () => {
                        document.getElementById('hintPage2').style.display = 'block';
                    });
                }
                else if (currentPage === 4) {
                    typeWriter('textPage4', txtPage4, 40, () => {
                        document.getElementById('hintPage4').style.display = 'block';
                    });
                }
                else if (currentPage === 5) {
                    typeWriter('cakeDefaultText', txtPage5Default, 30);
                }
                else if (currentPage === 6) {
                    typeWriter('textPage6', txtPage6, 40, () => {
                        document.getElementById('hintPage6').style.display = 'block';
                    });
                }
                else if (currentPage === 7) {
                    typeWriter('textPage7', txtPage7, 30);
                }
                else if (currentPage === 9) {
                    runHogwartsEntranceMovie();
                }
                else if (currentPage === 10) {
                    dumbleStage = 1;
                    const txtDumbleWelcome = "To our new students, congratulations on being Sorted. Your House will be your home, but it is your choices that will define who you become.";
                    typeWriter('textPage10', txtDumbleWelcome, 45, () => {
                        document.getElementById('hintPage10').style.display = 'block';
                    });
                }
                else if (currentPage === 11) {
                    document.getElementById('mysteryMusic').volume = 0.25;
                }
            }
        }

        /* ================= PAGE 4 LOGIC ================= */
        let page4VideoTriggered = false;
        function handlePage4VideoTrigger() {
            const hintBox = document.getElementById('hintPage4');
            if (hintBox.style.display === 'none') return;

            if (!page4VideoTriggered) {
                page4VideoTriggered = true;
                document.getElementById('boxPage4').style.display = 'none';
                
                const givingCakeVid = document.getElementById('givingCakeVideo');
                givingCakeVid.style.display = 'block';
                givingCakeVid.load();
                givingCakeVid.play().catch(err => {
                    console.log(err);
                    nextPage();
                });
                
                givingCakeVid.onended = function() {
                    nextPage();
                };
            }
        }

        /* ================= PAGE 5 LOGIC ================= */
        function revealMagicWishes(event) {
            event.stopPropagation();
            document.getElementById('cakeIcon').style.display = 'none';
            
            const wishBox = document.getElementById('cakeDialogueBox');
            wishBox.innerHTML = `
                <div class="scrollable-wishes">
                    This is your cake! I made it with love, care, and the most important are magic wishes!<br><br>
                    I wish you happiness that last through every seasons of life.<br>
                    I wish you good health and strength everyday.<br>
                    I wish you the courage to chase your dreams.<br>
                    I wish you success in everything you work hard for.<br>
                    I wish you a reason to smile everyday.<br>
                    I wish you financial stability.<br>
                    I wish you exciting opportunities that could help you grow.<br>
                    I wish you kindness from others and kindness towards yourself.<br>
                    I wish you a safe and comfortable life.<br>
                    I wish you restful nights.<br>
                    I wish you moments that remind you how loved you are.<br>
                    I wish you a chance to make a positive difference to the world.<br>
                    I wish you people who love and support you.<br>
                    I wish you a life that feels meaningful to you.<br>
                    I wish you the strength to keep going when things are tough.<br>
                    I wish you peace in difficult times.<br>
                    I wish you more adventures than worries.<br>
                    I wish you more laughter than tears.<br>
                    I wish you will have a long life to grow old with me.<br>
                    I wish you always feel taken care of and understood.<br>
                    I wish your pillows are cool every time you sleep.<br>
                    I wish you freedom of self-doubt.<br>
                    I wish you a healthy and happy family.<br>
                    I wish you people who brings out the best in you.<br>
                    I wish you a life that reflects your deepest values.<br><br>
                    These are my 25 magic wishes to the person I hold closest to my heart. ❤️
                </div>
                <button onclick="nextPage()" style="margin-top:12px; align-self:center; padding:6px 20px; background:#5C3A21; color:#fff; border:none; border-radius:5px; cursor:pointer; font-family:sans-serif; font-size:13px; font-weight:bold;">Continue Movie</button>
            `;
            wishBox.onclick = function(e) { e.stopPropagation(); };
        }

        /* ================= PAGE 7 LOGIC ================= */
        function selectDiagonItem(itemName, event) {
            event.stopPropagation();
            if (!itemsFound[itemName]) {
                itemsFound[itemName] = true;
                document.getElementById(`item${itemName.charAt(0).toUpperCase() + itemName.slice(1)}`).classList.add('collected');
                
                if (itemsFound.nimbus && itemsFound.wand && itemsFound.racoon && itemsFound.books) {
                    allItemsCollected = true; 
                    typeWriter('textPage7', "Splendid! You have gathered all your supplies. Time to catch the train at Platform 9¾!", 40, () => {
                        document.getElementById('hintPage7').style.display = 'block';
                    });
                }
            }
        }

        /* ================= PAGE 9 LOGIC ================= */
        function runHogwartsEntranceMovie() {
            document.getElementById('mysteryMusic').pause();
            
            const realEntranceVid = document.getElementById('entranceVideo');
            realEntranceVid.style.display = 'block';
            realEntranceVid.play();

            realEntranceVid.onended = function() {
                realEntranceVid.style.display = 'none';
                document.getElementById('sortingScene').style.display = 'flex';
                
                const bgMusic = document.getElementById('mysteryMusic');
                bgMusic.volume = 0.3;
                bgMusic.play();
                sortingStage = 1;
                
                typeWriter('textPage9', "Welcome, young witch or wizard, to Hogwarts School of Witchcraft and Wizardry!", 45, () => {
                    document.getElementById('hintPage9').style.display = 'block';
                });
            };
        }

        function handleSortingLogic() {
            if (sortingStage === 1) {
                document.getElementById('hintPage9').style.display = 'none';
                sortingStage = 2;
                typeWriter('textPage9', "I shall look inside your mind and place you in the house that suits you best. Now, put me on and let us see...", 45, () => {
                    document.getElementById('hintPage9').style.display = 'block';
                });
            } 
            else if (sortingStage === 2) {
                document.getElementById('hintPage9').style.display = 'none';
                document.getElementById('sortingHatImg').style.display = 'none';
                document.getElementById('childWithHatImg').style.display = 'block';
                
                const sortingAudio = document.getElementById('sortingHatSound');
                sortingAudio.volume = 1.0; 
                sortingAudio.play();
                isSortingAudioPlaying = true;
                sortingStage = 3;

                const txtHatSpeech = "There is nothing hidden in your head the sorting hat can not see, so try me on and I will tell you where you ought to be! Brave at heart, daring, better be......................... Griffindor!";
                
                typeWriter('textPage9', txtHatSpeech, 80);

                sortingAudio.onended = function() {
                    isSortingAudioPlaying = false;
                    document.getElementById('hintPage9').innerText = "Click anywhere to step into Great Hall";
                    document.getElementById('hintPage9').style.display = 'block';
                };
            } 
            else if (sortingStage === 3) {
                if (isSortingAudioPlaying) return;
                nextPage();
            }
        }

        /* ================= PAGE 10 LOGIC ================= */
        function handleDumbledoreLogic() {
            if (dumbleStage === 1) {
                document.getElementById('hintPage10').style.display = 'none';
                dumbleStage = 2;
                typeWriter('textPage10', "Before, I forget. Happy Birthday again, Eugene.", 45, () => {
                    document.getElementById('hintPage10').style.display = 'block';
                });
            } 
            else if (dumbleStage === 2) {
                document.getElementById('hintPage10').style.display = 'none';
                dumbleStage = 3;
                isDumbleAudioPlaying = true;
                
                const txtFinalQuote = "but you know..Happiness can be found.. even in the darkest.. of times... if one only remembers to turn on the light.";
                
                document.getElementById('mysteryMusic').volume = 0.05;

                const dumbleAudio = document.getElementById('endingspeechSound');
                dumbleAudio.volume = 1.0; 
                dumbleAudio.play().catch(e => console.log(e));

                typeWriter('textPage10', txtFinalQuote, 105, () => {
                    isDumbleAudioPlaying = false;
                    document.getElementById('hintPage10').innerText = "Click to reveal a final surprise 🪄";
                    document.getElementById('hintPage10').style.display = 'block';
                });
            }
            else if (dumbleStage === 3) {
                if (isDumbleAudioPlaying) return;
                nextPage();
            }
        }
    </script>
</body>
</html>
